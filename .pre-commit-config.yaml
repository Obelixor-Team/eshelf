repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (main only)
        entry: bash -c 'if [ "$(git branch --show-current)" != "main" ]; then exit 0; fi; .venv/bin/mypy src'
        language: system
        types: [python]

      - id: pytest
        name: pytest (main only)
        entry: bash -c 'if [ "$(git branch --show-current)" != "main" ]; then exit 0; fi; .venv/bin/pytest --cov=src --cov-fail-under=80'
        language: system
        pass_filenames: false
        always_run: true
